<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>파충류 행사 가이드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* 웹화면 정중앙 핸드폰 모양 세팅 */
      body {
        background-color: #1a1a1a;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        font-family: 'Pretendard', sans-serif;
      }
      .mobile-frame {
        width: 390px;
        height: 844px;
        background: #ffffff;
        border-radius: 40px;
        border: 8px solid #333;
        position: relative;
        overflow: hidden;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body>
    <div class="mobile-frame flex flex-col">
      <header class="p-6 pb-2">
        <h1 class="text-2xl font-bold text-green-600">Lizard Fair</h1>
        <p class="text-sm text-gray-500">오늘의 파충류 소식을 확인하세요!</p>
      </header>

      <main class="flex-1 overflow-y-auto hide-scrollbar p-4">
        <section class="mb-8">
          <div class="flex justify-between items-end mb-3">
            <h2 class="text-lg font-bold">💎 메가 페어 일정</h2>
            <span class="text-xs text-gray-400">전체보기</span>
          </div>
          <div class="flex gap-4 overflow-x-auto hide-scrollbar">
            <div
              class="min-w-[280px] h-40 bg-slate-800 rounded-2xl relative overflow-hidden shadow-lg"
            >
              <img
                src="https://via.placeholder.com/280x160"
                class="w-full h-full object-cover opacity-60"
              />
              <div class="absolute bottom-4 left-4 text-white">
                <p
                  class="text-xs font-semibold bg-green-500 inline-block px-2 py-1 rounded mb-1"
                >
                  D-7
                </p>
                <h3 class="font-bold">제 20회 렙타일 페어 - 서울</h3>
                <p class="text-[10px] text-gray-200">2026.03.15 ~ 16</p>
              </div>
            </div>
            <div
              class="min-w-[280px] h-40 bg-slate-700 rounded-2xl relative overflow-hidden"
            >
              <div
                class="absolute inset-0 flex items-center justify-center text-gray-400"
              >
                Loading...
              </div>
            </div>
          </div>
        </section>

        <section>
          <h2 class="text-lg font-bold mb-3">🦎 브리더 개인 번개</h2>
          <div class="space-y-4">
            <div
              class="flex gap-4 p-3 bg-gray-50 rounded-xl border border-gray-100"
            >
              <div class="w-16 h-16 bg-gray-200 rounded-lg flex-shrink-0"></div>
              <div class="flex-1">
                <h4 class="font-bold text-sm">[수원] 크레 브리더 크친소</h4>
                <p class="text-xs text-gray-500 mt-1">티그리스게코 매장</p>
                <div class="flex justify-between items-center mt-2">
                  <span class="text-[10px] text-green-600 font-bold"
                    >2/28(토)</span
                  >
                  <button
                    class="text-[10px] bg-white border border-gray-200 px-2 py-1 rounded"
                  >
                    상세보기
                  </button>
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>

      <nav
        class="h-20 bg-white border-t border-gray-100 flex justify-around items-center px-6"
      >
        <div class="flex flex-col items-center text-green-600">
          <div class="w-6 h-6 bg-green-600 rounded"></div>
          <span class="text-[10px] mt-1">홈</span>
        </div>
        <div class="flex flex-col items-center text-gray-400">
          <div class="w-6 h-6 bg-gray-300 rounded"></div>
          <span class="text-[10px] mt-1">달력</span>
        </div>
        <div class="flex flex-col items-center text-gray-400">
          <div class="w-6 h-6 bg-gray-300 rounded"></div>
          <span class="text-[10px] mt-1">브리더</span>
        </div>
      </nav>
    </div>
  </body>
</html>
