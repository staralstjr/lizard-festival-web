name: Daily Lizard Crawler

on:
  schedule:
    # 💡 매일 새벽 3시(한국 시간)에 실행 (UTC 기준 18:00)
    - cron: '0 18 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pymongo playwright Pillow certifi requests
          playwright install chromium

      - name: Run Crawler
        env:
          # 💡 중요: 보안을 위해 몽고DB 주소는 깃허브 Secret에 저장해야 합니다.
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          cd crawler
          python main_crawler.py
